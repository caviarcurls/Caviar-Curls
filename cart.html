<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart | Caviar Curls</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="cart-overlay">

<div class="cart-drawer">

<div class="cart-top">

<div class="cart-heading">
CART <span>(1 ITEM)</span>
</div>

<a href="index.html" class="close-cart">
✕
</a>

</div>

<div class="drawer-items">

<div class="drawer-item">

<img src="images/wig1.jpg">

<div class="drawer-info">

<h3>Straight Cambodian Wig</h3>

<p>Type: 13x4 Frontal</p>
<p>Length: 16"</p>

<div class="drawer-price">
£100.00
</div>

<div class="qty-wrap">

<button>-</button>

<span>1</span>

<button>+</button>

</div>

</div>

</div>

</div>

<div class="drawer-summary">

<div class="summary-line">
<span>Subtotal</span>
<span>£100.00</span>
</div>

<div class="summary-line">
<span>Shipping</span>
<span>Calculated at checkout</span>
</div>

<div class="summary-total">
<span>Total</span>
<span>£100.00</span>
</div>

<a href="checkout.html">
<button class="drawer-checkout">
CHECK OUT
</button>
</a>

</div>

</div>

</div>

</body>
</html>
