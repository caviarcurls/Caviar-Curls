<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Product | Caviar Curls
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com"
>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
>

<link
href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet"
>

<link
rel="stylesheet"
href="style.css"
>

</head>

<body>

<header class="shop-header">

<div class="shop-header-inner">

<a href="index.html" class="brand">

<span class="brand-main">
Caviar Curls
</span>

<span class="brand-sub">
PREMIUM LUXURY HAIR
</span>

</a>

<div class="shop-icons">

<a href="cart.html">
👜
</a>

</div>

</div>

</header>

<section class="product-page">

<div class="product-grid">

<!-- IMAGE -->

<div class="product-image-side">

<img
id="product-image"
src=""
alt="Product Image"
>

</div>

<!-- INFO -->

<div class="product-info-side">

<p class="product-mini">
Luxury Wig Collection
</p>

<h1 id="product-title">
Loading...
</h1>

<p
id="product-type"
class="product-type"
>
Loading...
</p>

<p
id="product-description"
class="product-description"
>
Loading...
</p>

<!-- LACE SELECTOR -->

<div class="selector-group">

<label>
Select Lace
</label>

<select id="lace-select">

<option>
Loading...
</option>

</select>

</div>

<!-- LENGTH SELECTOR -->

<div class="selector-group">

<label>
Select Length
</label>

<select id="length-select">

<option>
Loading...
</option>

</select>

</div>

<!-- PRICE -->

<h2
id="product-price"
class="product-price"
>
£0
</h2>

<!-- BUTTON -->

<button class="add-cart-btn">
Add To Cart
</button>

</div>

</div>

</section>

<script src="products.js"></script>

</body>

</html>
