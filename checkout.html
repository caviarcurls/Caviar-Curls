<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Checkout | Caviar Curls
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com"
>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
>

<link
href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet"
>

<link
rel="stylesheet"
href="style.css"
/>

<style>

.checkout-page{
  padding:30px 16px 80px;
}

.checkout-title{
  font-size:42px;
  font-family:'Cormorant Garamond',serif;
  margin-bottom:30px;
}

.checkout-layout{
  display:grid;
  gap:20px;
}

.checkout-form{
  background:white;
  border-radius:20px;
  padding:22px;
}

.checkout-form h3{
  margin-bottom:20px;
  font-size:20px;
}

.form-group{
  margin-bottom:16px;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
}

.form-group input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.08);
  font-size:14px;
}

.checkout-summary{
  background:white;
  border-radius:20px;
  padding:22px;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:16px;
  font-size:14px;
}

.summary-total{
  font-size:22px;
  font-weight:700;
}

.pay-btn{
  width:100%;
  padding:16px;
  border-radius:999px;
  background:#111;
  color:white;
  text-transform:uppercase;
  letter-spacing:2px;
  font-size:11px;
  margin-top:20px;
  border:none;
  cursor:pointer;
}

@media(min-width:769px){

  .checkout-page{
    max-width:1400px;
    margin:auto;
    padding:50px 20px 100px;
  }

  .checkout-layout{
    grid-template-columns:1fr 420px;
    align-items:start;
  }

}

</style>

</head>

<body>

<!-- HEADER -->

<header class="shop-header">

<div class="shop-header-inner">

<a href="index.html" class="brand">

<span class="brand-main">
Caviar Curls
</span>

<span class="brand-sub">
PREMIUM LUXURY HAIR
</span>

</a>

<div class="shop-icons">

<button class="menu-toggle">
☰
</button>

<a href="cart.html">
👜
</a>

</div>

</div>

</header>

<!-- MOBILE MENU -->

<div class="mobile-menu">

<a href="index.html">
Home
</a>

<a href="wigs.html">
Wigs
</a>

<a href="bundles.html">
Bundles
</a>

<a href="frontals.html">
Frontals
</a>

<a href="cart.html">
Cart
</a>

</div>

<!-- CHECKOUT -->

<section class="checkout-page">

<h1 class="checkout-title">
Checkout
</h1>

<div class="checkout-layout">

<!-- FORM -->

<div class="checkout-form">

<h3>
Shipping Information
</h3>

<div class="form-group">
<label>Full Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel">
</div>

<div class="form-group">
<label>Address</label>
<input type="text">
</div>

<div class="form-group">
<label>City</label>
<input type="text">
</div>

<div class="form-group">
<label>Postcode</label>
<input type="text">
</div>

</div>

<!-- SUMMARY -->

<div class="checkout-summary">

<div class="summary-row">
<span>Product</span>
<span id="checkout-product"></span>
</div>

<div class="summary-row">
<span>Length</span>
<span id="checkout-length"></span>
</div>

<div class="summary-row">
<span>Type</span>
<span id="checkout-type"></span>
</div>

<div class="summary-row">
<span>Shipping</span>
<span>FREE</span>
</div>

<div class="summary-row summary-total">
<span>Total</span>
<span id="checkout-total">£0</span>
</div>

<button class="pay-btn">
Complete Payment
</button>

</div>

</div>

</section>

<script>

const item =
JSON.parse(
localStorage.getItem("checkoutProduct")
);

if(item){

document.getElementById(
"checkout-product"
).innerText =
item.title;

document.getElementById(
"checkout-length"
).innerText =
item.length + '"';

document.getElementById(
"checkout-type"
).innerText =
item.type;

document.getElementById(
"checkout-total"
).innerText =
"£" + item.price;

}

document.querySelector(
".pay-btn"
).addEventListener("click", ()=>{

alert(
"Stripe integration ready 😭🔥"
);

});

</script>

</body>

</html>
